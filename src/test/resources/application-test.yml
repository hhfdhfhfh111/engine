server:
  port: 8009

spring:
  application:
    name: KnowEngine-Test
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://192.168.79.101:3306/know_engine?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: know_engine
    password: ${MYSQL_PASSWORD:123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      max-wait: 60000
  data:
    redis:
      host: 192.168.79.101
      port: 6379
      password: ${REDIS_PASSWORD:123456}
      ssl:
        enabled: true
  redis:
    redisson:
      config: |
        singleServerConfig:
          idleConnectionTimeout: 10000
          connectTimeout: 10000
          timeout: 3000
          retryAttempts: 3
          retryInterval: 1500
          password: ${REDIS_PASSWORD:123456}
          subscriptionsPerConnection: 5
          address: "redis://192.168.79.101:6379"
          database: 0
        threads: 4
        nettyThreads: 8
        codec: !<org.redisson.codec.JsonJacksonCodec> {}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml

# LangChain4j 配置 - 用于意图识别测试
langchain4j:
  open-ai:
    chat-model:
      api-key: sk-3c2c69f23adc4637821243d8003ec27a
      model-name: qwen-max-latest
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: sk-3c2c69f23adc4637821243d8003ec27a
      model-name: qwen-max-latest
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      log-requests: true
      log-responses: true

# 日志配置
logging:
  level:
    cn.hollis.llm.mentor: DEBUG
    dev.langchain4j: DEBUG
