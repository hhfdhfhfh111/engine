server:
  port: 8009

spring:
  application:
    name: KnowEngine
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://192.168.79.101:3306/know_engine?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: root
    password: ${MYSQL_PASSWORD:123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
    initial-size: 5
    min-idle: 5
    max-active: 20
    max-wait: 60000
    time-between-eviction-runs-millis: 60000
    min-evictable-idle-time-millis: 300000
    validation-query: SELECT 1
    test-while-idle: true
    test-on-borrow: false
    test-on-return: false
    pool-prepared-statements: true
    max-pool-prepared-statement-per-connection-size: 20
    filters: stat,wall
    connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
    stat-view-servlet:
      enabled: true
      url-pattern: /druid/*
      login-username: admin
      login-password: ${DRUID_PASSWORD:admin}
  data:
    redis:
      host: 192.168.79.101
      port: 6379
      password: ${REDIS_PASSWORD:123456}
      ssl:
        enabled: true
  redis:
    redisson:
      config: |
        singleServerConfig:
          idleConnectionTimeout: 10000
          connectTimeout: 10000
          timeout: 3000
          retryAttempts: 3
          retryInterval: 1500
          password: ${REDIS_PASSWORD:123456}
          subscriptionsPerConnection: 5
          clientName: null
          address: "redis://192.168.79.101:6379"
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 50
          connectionMinimumIdleSize: 24
          connectionPoolSize: 64
          database: 0
          dnsMonitoringInterval: 5000
        threads: 16
        nettyThreads: 32
        codec: !<org.redisson.codec.JsonJacksonCodec> {}
        transportMode: "NIO"

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml

langchain4j:
  open-ai:
    chat-model:
      api-key: sk-3c2c69f23adc4637821243d8003ec27a
      model-name: qwen-max-latest
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: sk-3c2c69f23adc4637821243d8003ec27a
      model-name: qwen-max-latest
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      log-requests: true
      log-responses: true
  community:
    neo4j:
      await-index-timeout: 300
      auth:
        uri: bolt://192.168.79.101:7687
        user: neo4j
        password: ${NEO4J_PASSWORD:neo4j666}

elasticsearch:
  host: http://192.168.79.101:9200
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model-name: text-embedding-v4
  api-key: sk-3c2c69f23adc4637821243d8003ec27a
  dimensions: 1536

minio:
  url: http://192.168.79.101:9000 # 记得改成你自己的
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  bucketName: know-engine
  endpoint: http://192.168.79.101:9000

neo4j:
  uri: bolt://192.168.79.101:7687
  username: neo4j
  password: ${NEO4J_PASSWORD:neo4j666}

# 文件解析服务配置
file:
  parse:
    api:
      url: http://192.168.79.101:8000 # 文档解析接口地址，记得改成你自己的

# XXL-Job 配置
xxl:
  job:
    admin:
      addresses: http://192.168.79.101:8080/xxl-job-admin # xxl-job-admin 地址，记得改成你自己的
    accessToken: ${XXL_JOB_ACCESS_TOKEN:default_token}
    executor:
      appname: know-engine-executor # 执行器名称
